name: Generate Stubs

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  generate_stubs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Generate stubs
        run: uv run stubgen -p pydantic_logger -o stubs/

      - name: Commit stubs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stubs/
          git diff --cached --quiet || git commit -m "chore: regenerate stubs for pydantic_logger"
          git pull --rebase origin main
          git push origin main